set-option -g prefix C-q
bind C-t next-window
bind C-n next-window
bind C-p previous-window

bind '"' split-window -v -c "#{pane_current_path}"
bind "'" split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

set -g status-bg cyan
set -g status-fg black

set -g mouse on

set -g status-interval 5
set -g window-status-format '#{pane_current_command}@#(p="#{pane_current_path}"; g=$(git -C "$p" rev-parse --git-common-dir 2>/dev/null); if [ -n "$g" ]; then basename "$(dirname "$g")"; else basename "$p"; fi) '
set -g window-status-current-format '#{pane_current_command}@#(p="#{pane_current_path}"; g=$(git -C "$p" rev-parse --git-common-dir 2>/dev/null); if [ -n "$g" ]; then basename "$(dirname "$g")"; else basename "$p"; fi)* '

# prefix を C-q にするなら、デフォルト C-b は外しておく
unbind C-b
set -g prefix C-q
bind C-q send-prefix

# 設定リロード
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# pane zoom toggle
bind z resize-pane -Z

# pane 番号を表示してジャンプ
bind q display-panes

# window / pane の番号を 1 始まりにする
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

